<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>✍️ 묵상 작성</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f4ef; --panel: #ffffff; --ink: #2b2722; --muted: #8a8378;
    --line: #e7e2d8; --accent: #8a6d3b; --accent-soft: #f0e9da;
    --sans: "Noto Sans KR", system-ui, sans-serif;
    --serif: "Noto Serif KR", Georgia, serif;
    --ai: #3b5b8a; --ai-soft: #e8eef6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--sans); color: var(--ink); background: var(--bg); height: 100vh; display: flex; flex-direction: column; }

  /* 상단 바 */
  .topbar { display: flex; align-items: center; gap: 14px; padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .topbar h1 { font-family: var(--serif); font-size: 18px; margin: 0; white-space: nowrap; }
  .topbar .spacer { flex: 1; }
  .field { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .field input { font-family: var(--sans); font-size: 14px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink); }
  .field input#topic { width: 130px; }
  .btn { border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: var(--sans); display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn:hover { filter: brightness(1.07); }
  .btn:disabled { opacity: .5; cursor: not-allowed; filter: none; }
  .btn.ghost { background: #fff; color: var(--accent); }
  .status { font-size: 12px; color: var(--muted); }

  /* 3분할 */
  .panes { flex: 1; display: grid; grid-template-columns: 1fr 1fr 360px; min-height: 0; }
  .pane { display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--line); }
  .pane:last-child { border-right: 0; }
  .pane-head { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .04em; padding: 9px 16px; border-bottom: 1px solid var(--line); background: var(--panel); display: flex; align-items: center; justify-content: space-between; }

  /* 에디터 */
  #editor { flex: 1; border: 0; outline: 0; resize: none; padding: 22px 24px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; line-height: 1.7; color: var(--ink); background: #fffdf9; }

  /* 미리보기 (공개 뷰어와 동일 타이포) */
  .preview-scroll { flex: 1; overflow-y: auto; padding: 28px 26px; }
  .sheet { background: #fff; max-width: 680px; margin: 0 auto; border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.05); padding: 44px 48px; }
  .doc-topic { display: inline-block; font-size: 12px; color: var(--accent); background: var(--accent-soft); padding: 3px 12px; border-radius: 999px; margin-bottom: 18px; letter-spacing: .04em; }
  .doc { font-family: var(--serif); color: var(--ink); line-height: 1.9; font-size: 16.5px; }
  .doc h1 { font-size: 27px; margin: 0 0 18px; line-height: 1.35; }
  .doc h2 { font-size: 20px; margin: 30px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  .doc h3 { font-size: 17px; margin: 22px 0 8px; color: var(--accent); }
  .doc p { margin: 12px 0; }
  .doc ul, .doc ol { padding-left: 1.3em; }
  .doc li { margin: 5px 0; }
  .doc blockquote { margin: 18px 0; padding: 12px 20px; border-left: 4px solid var(--accent); background: var(--accent-soft); border-radius: 0 8px 8px 0; color: #5c5448; }
  .doc hr { border: 0; border-top: 1px solid var(--line); margin: 26px 0; }
  .doc code { font-family: ui-monospace, monospace; font-size: .9em; background: var(--bg); padding: 1px 5px; border-radius: 4px; }

  /* AI 채팅 */
  .chat { background: var(--panel); }
  .chat-head .engine { display: flex; gap: 4px; }
  .chat-head .engine button { font-size: 11px; padding: 3px 9px; border: 1px solid var(--line); background: #fff; border-radius: 999px; color: var(--muted); cursor: pointer; }
  .chat-head .engine button.active { background: var(--ai-soft); color: var(--ai); border-color: var(--ai-soft); font-weight: 700; }
  .chat-head .engine button:disabled { opacity: .35; cursor: not-allowed; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { font-size: 13.5px; line-height: 1.65; padding: 10px 13px; border-radius: 12px; max-width: 92%; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent-soft); color: #5c5448; border-bottom-right-radius: 3px; }
  .msg.ai { align-self: flex-start; background: var(--ai-soft); color: #2c3a4f; border-bottom-left-radius: 3px; position: relative; }
  .msg.ai .insert { margin-top: 7px; font-size: 11px; color: var(--ai); background: #fff; border: 1px solid #cdd9ea; border-radius: 6px; padding: 2px 8px; cursor: pointer; }
  .msg.note { align-self: center; color: var(--muted); font-size: 12px; background: none; }
  .chat-input { border-top: 1px solid var(--line); padding: 10px; display: flex; gap: 8px; }
  .chat-input textarea { flex: 1; resize: none; height: 46px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px; font-family: var(--sans); font-size: 13.5px; line-height: 1.5; }
  .chat-input button { align-self: stretch; }
  .hint { padding: 10px 16px; font-size: 11.5px; color: var(--muted); border-bottom: 1px solid var(--line); background: #fbfaf6; }
  .hint b { color: var(--ai); }

  /* 발행 결과 토스트 */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2b2722; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; max-width: 80vw; box-shadow: 0 8px 30px rgba(0,0,0,.25); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 50; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  #toast a { color: #f0e9da; }

  @media (max-width: 960px) {
    .panes { grid-template-columns: 1fr; grid-template-rows: auto; overflow-y: auto; }
    .pane { border-right: 0; border-bottom: 1px solid var(--line); height: 60vh; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>✍️ 묵상 작성</h1>
    <div class="field">주제 <input id="topic" list="topicList" placeholder="감사" /></div>
    <datalist id="topicList"></datalist>
    <div class="field">날짜 <input id="date" type="date" /></div>
    <div class="spacer"></div>
    <span class="status" id="status">…</span>
    <button class="btn ghost" id="newBtn">＋ 새 묵상</button>
    <button class="btn" id="publishBtn">📮 발행</button>
  </div>

  <div class="panes">
    <!-- 에디터 -->
    <section class="pane">
      <div class="pane-head"><span>마크다운</span><span class="status" id="charCount"></span></div>
      <textarea id="editor" spellcheck="false"></textarea>
    </section>

    <!-- 미리보기 -->
    <section class="pane">
      <div class="pane-head"><span>미리보기 (인쇄 모습)</span></div>
      <div class="preview-scroll">
        <article class="sheet">
          <span class="doc-topic" id="pvTopic">주제</span>
          <div class="doc" id="preview"></div>
        </article>
      </div>
    </section>

    <!-- AI 채팅 -->
    <section class="pane chat">
      <div class="pane-head chat-head">
        <span>🤖 AI 함께쓰기</span>
        <span class="engine" id="engine">
          <button data-engine="claude">claude</button>
          <button data-engine="codex">codex</button>
        </span>
      </div>
      <div class="hint">말씀을 주고 <b>"핵심이 뭐야?"</b>, <b>"적용 질문 3개"</b>, <b>"내 묵상 다듬어줘"</b> 처럼 대화하세요. 답변 아래 <b>↓ 본문에 넣기</b>로 에디터에 붙일 수 있어요.</div>
      <div class="messages" id="messages"></div>
      <div class="chat-input">
        <textarea id="chatBox" placeholder="메시지… (Enter 전송 / Shift+Enter 줄바꿈)"></textarea>
        <button class="btn" id="sendBtn">보내기</button>
      </div>
    </section>
  </div>

  <div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const $ = (s) => document.querySelector(s);
let engine = 'claude';
let engines = { claude: false, codex: false };
const history = []; // {role:'user'|'assistant', content}

/* ---------- 초기화 ---------- */
function todayStr() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}
function starterDoc() {
  return `# ${todayStr()} 묵상\n\n- **주제**: \n- **본문**: \n\n---\n\n`;
}

async function boot() {
  $('#date').value = todayStr();
  $('#editor').value = starterDoc();
  renderPreview();

  try {
    const s = await (await fetch('/api/status')).json();
    engines = s.engines;
    const remote = s.remote ? s.remote.replace(/^https?:\/\//, '') : '원격 없음';
    $('#status').textContent = remote;
    // 엔진 버튼 상태
    document.querySelectorAll('#engine button').forEach((b) => {
      const e = b.dataset.engine;
      b.disabled = !engines[e];
      b.classList.toggle('active', e === engine);
    });
    if (!engines.claude && engines.codex) setEngine('codex');
    if (!engines.claude && !engines.codex) {
      addMsg('note', 'claude / codex CLI 를 찾지 못했어요. 채팅은 비활성화됩니다 (작성·발행은 가능).');
      $('#sendBtn').disabled = true;
    }
  } catch (e) {
    $('#status').textContent = '서버 상태 확인 실패';
  }

  try {
    const t = await (await fetch('/api/topics')).json();
    $('#topicList').innerHTML = (t.topics || []).map((x) => `<option value="${x}">`).join('');
  } catch {}

  addMsg('note', '오늘 묵상할 말씀이나 주제를 알려주시면 같이 시작해볼게요. 📖');
}

/* ---------- 미리보기 ---------- */
function renderPreview() {
  $('#preview').innerHTML = marked.parse($('#editor').value || '');
  $('#pvTopic').textContent = $('#topic').value.trim() || '주제';
  const n = $('#editor').value.length;
  $('#charCount').textContent = n ? `${n}자` : '';
}
$('#editor').addEventListener('input', renderPreview);
$('#topic').addEventListener('input', renderPreview);

/* ---------- 새 묵상 ---------- */
$('#newBtn').addEventListener('click', () => {
  if (!confirm('에디터 내용을 새 묵상으로 초기화할까요? (저장되지 않은 내용은 사라집니다)')) return;
  $('#date').value = todayStr();
  $('#editor').value = starterDoc();
  renderPreview();
});

/* ---------- 엔진 선택 ---------- */
function setEngine(e) {
  if (!engines[e]) return;
  engine = e;
  document.querySelectorAll('#engine button').forEach((b) => b.classList.toggle('active', b.dataset.engine === e));
}
document.querySelectorAll('#engine button').forEach((b) =>
  b.addEventListener('click', () => setEngine(b.dataset.engine))
);

/* ---------- 채팅 ---------- */
function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'ai') {
    div.textContent = content;
    const ins = document.createElement('button');
    ins.className = 'insert';
    ins.textContent = '↓ 본문에 넣기';
    ins.onclick = () => {
      const ed = $('#editor');
      ed.value = ed.value.replace(/\s*$/, '') + '\n\n' + content + '\n';
      renderPreview();
      ed.scrollTop = ed.scrollHeight;
    };
    div.appendChild(document.createElement('br'));
    div.appendChild(ins);
  } else {
    div.textContent = content;
  }
  $('#messages').appendChild(div);
  $('#messages').scrollTop = $('#messages').scrollHeight;
  return div;
}

async function send() {
  const box = $('#chatBox');
  const text = box.value.trim();
  if (!text) return;
  if (!engines[engine]) { addMsg('note', `'${engine}' 엔진을 쓸 수 없어요.`); return; }

  box.value = '';
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  $('#sendBtn').disabled = true;
  const thinking = addMsg('note', `${engine} 생각 중…`);
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ engine, messages: history }),
    });
    const data = await res.json();
    thinking.remove();
    if (!res.ok) throw new Error(data.error || '오류');
    addMsg('ai', data.reply);
    history.push({ role: 'assistant', content: data.reply });
  } catch (e) {
    thinking.remove();
    addMsg('note', '⚠️ ' + e.message);
  } finally {
    $('#sendBtn').disabled = false;
    box.focus();
  }
}
$('#sendBtn').addEventListener('click', send);
$('#chatBox').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ---------- 발행 ---------- */
function toast(html, ms = 6000) {
  const t = $('#toast');
  t.innerHTML = html;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), ms);
}

$('#publishBtn').addEventListener('click', async () => {
  const topic = $('#topic').value.trim();
  const date = $('#date').value;
  const content = $('#editor').value;
  if (!topic) { toast('주제를 입력하세요.'); $('#topic').focus(); return; }
  if (!date) { toast('날짜를 선택하세요.'); return; }
  if (!content.trim()) { toast('내용이 비어 있어요.'); return; }

  const btn = $('#publishBtn');
  btn.disabled = true;
  btn.textContent = '발행 중…';
  try {
    const res = await fetch('/api/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, date, content, push: true }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '발행 실패');

    // 자동완성 목록 갱신
    if (![...$('#topicList').options].some((o) => o.value === topic)) {
      const opt = document.createElement('option');
      opt.value = topic;
      $('#topicList').appendChild(opt);
    }

    if (data.pushed) {
      toast(`✅ 발행 완료 — <code>${data.path}</code><br>1~2분 뒤 <a href="https://navskh.github.io/meditation/" target="_blank">공개 뷰어</a>에 반영됩니다.`, 9000);
    } else {
      const failed = (data.steps || []).filter((s) => !s.ok).map((s) => s.step).join(', ');
      toast(`💾 저장+커밋은 됐지만 push 실패 (${failed || '원격'}). 터미널에서 <code>git push</code> 확인이 필요해요.`, 9000);
    }
  } catch (e) {
    toast('⚠️ ' + e.message, 8000);
  } finally {
    btn.disabled = false;
    btn.textContent = '📮 발행';
  }
});

boot();
</script>
</body>
</html>
