<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>✍️ 묵상 작성</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f4ef; --panel: #ffffff; --ink: #2b2722; --muted: #8a8378;
    --line: #e7e2d8; --accent: #8a6d3b; --accent-soft: #f0e9da;
    --sans: "Noto Sans KR", system-ui, sans-serif;
    --serif: "Noto Serif KR", Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--sans); color: var(--ink); background: var(--bg); height: 100vh; display: flex; flex-direction: column; }

  /* 상단 바 */
  .topbar { display: flex; align-items: center; gap: 14px; padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .topbar h1 { font-family: var(--serif); font-size: 18px; margin: 0; white-space: nowrap; }
  .topbar .spacer { flex: 1; }
  .field { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .field input { font-family: var(--sans); font-size: 14px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink); }
  .field input#topic { width: 130px; }
  .btn { border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: var(--sans); display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn:hover { filter: brightness(1.07); }
  .btn:disabled { opacity: .5; cursor: not-allowed; filter: none; }
  .btn.ghost { background: #fff; color: var(--accent); }
  .status { font-size: 12px; color: var(--muted); }

  /* 2분할 */
  .panes { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
  .pane { display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--line); }
  .pane:last-child { border-right: 0; }
  .pane-head { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .04em; padding: 9px 16px; border-bottom: 1px solid var(--line); background: var(--panel); display: flex; align-items: center; justify-content: space-between; }

  /* 에디터 */
  #editor { flex: 1; border: 0; outline: 0; resize: none; padding: 22px 24px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; line-height: 1.7; color: var(--ink); background: #fffdf9; }

  /* 미리보기 (공개 뷰어와 동일 타이포) */
  .preview-scroll { flex: 1; overflow-y: auto; padding: 28px 26px; }
  .sheet { background: #fff; max-width: 680px; margin: 0 auto; border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.05); padding: 44px 48px; }
  .doc-topic { display: inline-block; font-size: 12px; color: var(--accent); background: var(--accent-soft); padding: 3px 12px; border-radius: 999px; margin-bottom: 18px; letter-spacing: .04em; }
  .doc { font-family: var(--serif); color: var(--ink); line-height: 1.9; font-size: 16.5px; }
  .doc h1 { font-size: 27px; margin: 0 0 18px; line-height: 1.35; }
  .doc h2 { font-size: 20px; margin: 30px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  .doc h3 { font-size: 17px; margin: 22px 0 8px; color: var(--accent); }
  .doc p { margin: 12px 0; }
  .doc ul, .doc ol { padding-left: 1.3em; }
  .doc li { margin: 5px 0; }
  .doc blockquote { margin: 18px 0; padding: 12px 20px; border-left: 4px solid var(--accent); background: var(--accent-soft); border-radius: 0 8px 8px 0; color: #5c5448; }
  .doc hr { border: 0; border-top: 1px solid var(--line); margin: 26px 0; }
  .doc code { font-family: ui-monospace, monospace; font-size: .9em; background: var(--bg); padding: 1px 5px; border-radius: 4px; }

  /* 발행 결과 토스트 */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2b2722; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; max-width: 80vw; box-shadow: 0 8px 30px rgba(0,0,0,.25); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 50; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  #toast a { color: #f0e9da; }

  @media (max-width: 860px) {
    .panes { grid-template-columns: 1fr; grid-template-rows: auto; overflow-y: auto; }
    .pane { border-right: 0; border-bottom: 1px solid var(--line); height: 60vh; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>✍️ 묵상 작성</h1>
    <div class="field">주제 <input id="topic" list="topicList" placeholder="감사" /></div>
    <datalist id="topicList"></datalist>
    <div class="field">날짜 <input id="date" type="date" /></div>
    <div class="spacer"></div>
    <span class="status" id="status">…</span>
    <button class="btn ghost" id="newBtn">＋ 새 묵상</button>
    <button class="btn" id="publishBtn">📮 발행</button>
  </div>

  <div class="panes">
    <!-- 에디터 -->
    <section class="pane">
      <div class="pane-head"><span>마크다운</span><span class="status" id="charCount"></span></div>
      <textarea id="editor" spellcheck="false"></textarea>
    </section>

    <!-- 미리보기 -->
    <section class="pane">
      <div class="pane-head"><span>미리보기 (인쇄 모습)</span></div>
      <div class="preview-scroll">
        <article class="sheet">
          <span class="doc-topic" id="pvTopic">주제</span>
          <div class="doc" id="preview"></div>
        </article>
      </div>
    </section>
  </div>

  <div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const $ = (s) => document.querySelector(s);

/* ---------- 초기화 ---------- */
function todayStr() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}
function starterDoc() {
  return `# ${todayStr()} 묵상\n\n- **주제**: \n- **본문**: \n\n---\n\n`;
}

async function boot() {
  $('#date').value = todayStr();
  $('#editor').value = starterDoc();
  renderPreview();

  try {
    const s = await (await fetch('/api/status')).json();
    $('#status').textContent = s.remote ? s.remote.replace(/^https?:\/\//, '') : '원격 없음';
  } catch (e) {
    $('#status').textContent = '서버 상태 확인 실패';
  }

  try {
    const t = await (await fetch('/api/topics')).json();
    $('#topicList').innerHTML = (t.topics || []).map((x) => `<option value="${x}">`).join('');
  } catch {}
}

/* ---------- 미리보기 ---------- */
function renderPreview() {
  $('#preview').innerHTML = marked.parse($('#editor').value || '');
  $('#pvTopic').textContent = $('#topic').value.trim() || '주제';
  const n = $('#editor').value.length;
  $('#charCount').textContent = n ? `${n}자` : '';
}
$('#editor').addEventListener('input', renderPreview);
$('#topic').addEventListener('input', renderPreview);

/* ---------- 새 묵상 ---------- */
$('#newBtn').addEventListener('click', () => {
  if (!confirm('에디터 내용을 새 묵상으로 초기화할까요? (저장되지 않은 내용은 사라집니다)')) return;
  $('#date').value = todayStr();
  $('#editor').value = starterDoc();
  renderPreview();
});

/* ---------- 발행 ---------- */
function toast(html, ms = 6000) {
  const t = $('#toast');
  t.innerHTML = html;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), ms);
}

$('#publishBtn').addEventListener('click', async () => {
  const topic = $('#topic').value.trim();
  const date = $('#date').value;
  const content = $('#editor').value;
  if (!topic) { toast('주제를 입력하세요.'); $('#topic').focus(); return; }
  if (!date) { toast('날짜를 선택하세요.'); return; }
  if (!content.trim()) { toast('내용이 비어 있어요.'); return; }

  const btn = $('#publishBtn');
  btn.disabled = true;
  btn.textContent = '발행 중…';
  try {
    const res = await fetch('/api/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, date, content, push: true }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '발행 실패');

    // 자동완성 목록 갱신
    if (![...$('#topicList').options].some((o) => o.value === topic)) {
      const opt = document.createElement('option');
      opt.value = topic;
      $('#topicList').appendChild(opt);
    }

    if (data.pushed) {
      toast(`✅ 발행 완료 — <code>${data.path}</code><br>1~2분 뒤 <a href="https://navskh.github.io/meditation/" target="_blank">공개 뷰어</a>에 반영됩니다.`, 9000);
    } else {
      const failed = (data.steps || []).filter((s) => !s.ok).map((s) => s.step).join(', ');
      toast(`💾 저장+커밋은 됐지만 push 실패 (${failed || '원격'}). 터미널에서 <code>git push</code> 확인이 필요해요.`, 9000);
    }
  } catch (e) {
    toast('⚠️ ' + e.message, 8000);
  } finally {
    btn.disabled = false;
    btn.textContent = '📮 발행';
  }
});

boot();
</script>
</body>
</html>
