<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>성경 묵상</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f4ef;
    --panel: #ffffff;
    --ink: #2b2722;
    --muted: #8a8378;
    --line: #e7e2d8;
    --accent: #8a6d3b;
    --accent-soft: #f0e9da;
    --sans: "Noto Sans KR", system-ui, sans-serif;
    --serif: "Noto Serif KR", Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    display: flex;
    min-height: 100vh;
  }

  /* ===== 사이드바 ===== */
  .sidebar {
    width: 280px;
    flex: 0 0 280px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
  }
  .brand {
    padding: 22px 20px 14px;
    border-bottom: 1px solid var(--line);
  }
  .brand h1 { font-family: var(--serif); font-size: 20px; margin: 0; }
  .brand p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }

  .tabs { display: flex; gap: 6px; padding: 12px 16px 6px; }
  .tab {
    flex: 1; padding: 7px 0; font-size: 13px; cursor: pointer;
    border: 1px solid var(--line); background: #fff; border-radius: 999px;
    color: var(--muted); text-align: center; transition: .15s;
  }
  .tab.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); font-weight: 700; }

  .list { overflow-y: auto; padding: 8px 10px 24px; flex: 1; }
  .group-title {
    font-family: var(--serif); font-size: 14px; font-weight: 700;
    color: var(--accent); padding: 14px 10px 6px; letter-spacing: .02em;
  }
  .item {
    display: block; padding: 9px 12px; border-radius: 8px; cursor: pointer;
    font-size: 14px; color: var(--ink); text-decoration: none; line-height: 1.3;
  }
  .item:hover { background: var(--bg); }
  .item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .item .meta { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
  .item.active .meta { color: var(--accent); }
  .empty { padding: 20px; color: var(--muted); font-size: 13px; }

  /* ===== 본문 ===== */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-bottom: 1px solid var(--line);
    background: rgba(246,244,239,.85); backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 5;
  }
  .crumb { font-size: 13px; color: var(--muted); }
  .crumb b { color: var(--accent); font-weight: 700; }
  .btn {
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
    font-family: var(--sans); display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { filter: brightness(1.07); }

  .scroll { overflow-y: auto; flex: 1; padding: 32px 24px 80px; }

  /* 인쇄될 묵상 카드 (A4 비율 종이) */
  .sheet {
    background: #fff; max-width: 760px; margin: 0 auto;
    border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,.05);
    padding: 56px 60px;
  }
  .sheet .doc-topic {
    display: inline-block; font-size: 12px; color: var(--accent);
    background: var(--accent-soft); padding: 3px 12px; border-radius: 999px;
    margin-bottom: 18px; letter-spacing: .04em;
  }

  /* 마크다운 본문 타이포 */
  .doc { font-family: var(--serif); color: var(--ink); line-height: 1.9; font-size: 16.5px; }
  .doc h1 { font-size: 27px; margin: 0 0 18px; line-height: 1.35; }
  .doc h2 { font-size: 20px; margin: 30px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  .doc h3 { font-size: 17px; margin: 22px 0 8px; color: var(--accent); }
  .doc p { margin: 12px 0; }
  .doc ul, .doc ol { padding-left: 1.3em; }
  .doc li { margin: 5px 0; }
  .doc strong { font-weight: 700; }
  .doc blockquote {
    margin: 18px 0; padding: 12px 20px; border-left: 4px solid var(--accent);
    background: var(--accent-soft); border-radius: 0 8px 8px 0; color: #5c5448;
  }
  .doc hr { border: 0; border-top: 1px solid var(--line); margin: 26px 0; }
  .doc code {
    font-family: ui-monospace, SFMono-Regular, monospace; font-size: .9em;
    background: var(--bg); padding: 1px 5px; border-radius: 4px;
  }
  .doc table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  .doc th, .doc td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
  .doc th { background: var(--bg); }

  .placeholder { text-align: center; color: var(--muted); margin-top: 18vh; font-family: var(--serif); }
  .placeholder .big { font-size: 40px; }

  /* 모바일 */
  .menu-btn { display: none; }
  @media (max-width: 820px) {
    body { flex-direction: column; }
    .sidebar {
      position: fixed; z-index: 30; height: 100vh; transform: translateX(-100%);
      transition: transform .22s; box-shadow: 4px 0 24px rgba(0,0,0,.12);
    }
    .sidebar.open { transform: translateX(0); }
    .menu-btn { display: inline-flex; }
    .sheet { padding: 32px 22px; }
    .scroll { padding: 18px 12px 60px; }
    .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 20; }
    .backdrop.show { display: block; }
  }

  /* =========================================================
     인쇄: 묵상 한 편을 A4 낱장으로
     ========================================================= */
  @media print {
    @page { size: A4; margin: 20mm 18mm; }
    .sidebar, .toolbar, .backdrop, .menu-btn { display: none !important; }
    body { display: block; background: #fff; }
    .main, .scroll { display: block; overflow: visible; height: auto; padding: 0; }
    .sheet {
      max-width: none; margin: 0; border: 0; border-radius: 0;
      box-shadow: none; padding: 0;
      page-break-after: always; break-after: page;
    }
    .doc { font-size: 12pt; line-height: 1.7; color: #000; }
    .doc h1 { font-size: 20pt; }
    .doc h2 { font-size: 14pt; }
    .doc h3 { font-size: 12.5pt; }
    .doc blockquote { background: none; border-left: 3px solid #555; color: #222; }
    .sheet .doc-topic { border: 1px solid #999; background: none; color: #000; }
    /* 제목/소제목이 페이지 끝에 혼자 남지 않게 */
    .doc h1, .doc h2, .doc h3 { break-after: avoid; }
    .doc p, .doc li, .doc blockquote { break-inside: avoid; }
    a { color: #000; text-decoration: none; }
  }
</style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>📖 성경 묵상</h1>
      <p>날짜 + 주제로 쌓는 QT 기록</p>
    </div>
    <div class="tabs">
      <div class="tab active" data-view="date">날짜별</div>
      <div class="tab" data-view="topic">주제별</div>
    </div>
    <nav class="list" id="list"></nav>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <main class="main">
    <div class="toolbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn menu-btn" id="menuBtn" style="background:#fff;color:var(--accent)">☰</button>
        <span class="crumb" id="crumb">묵상을 선택하세요</span>
      </div>
      <button class="btn" id="printBtn">🖨️ 이 묵상 인쇄</button>
    </div>
    <div class="scroll">
      <article class="sheet" id="sheet">
        <div class="placeholder">
          <div class="big">📖</div>
          <p>왼쪽 목록에서 묵상을 골라주세요.</p>
        </div>
      </article>
    </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const $ = (s) => document.querySelector(s);
let DATA = [];
let view = 'date';
let current = null;

async function boot() {
  try {
    const res = await fetch('meditations.json', { cache: 'no-store' });
    DATA = (await res.json()).meditations || [];
  } catch (e) {
    DATA = [];
  }
  renderList();
  // 해시(#topics/...) 가 있으면 그 묵상, 없으면 최신 묵상
  const hash = decodeURIComponent(location.hash.slice(1));
  const target = DATA.find((d) => d.path === hash) || DATA[0];
  if (target) open(target);
}

function renderList() {
  const list = $('#list');
  if (DATA.length === 0) {
    list.innerHTML = '<div class="empty">아직 묵상이 없습니다.<br>topics/ 폴더에 추가한 뒤<br><code>node generate.js</code> 를 실행하세요.</div>';
    return;
  }
  let html = '';
  if (view === 'topic') {
    const groups = {};
    DATA.forEach((d) => (groups[d.topic] ||= []).push(d));
    Object.keys(groups).sort((a, b) => a.localeCompare(b, 'ko')).forEach((topic) => {
      html += `<div class="group-title">${esc(topic)}</div>`;
      groups[topic]
        .sort((a, b) => b.date.localeCompare(a.date))
        .forEach((d) => (html += itemHtml(d, d.date)));
    });
  } else {
    DATA.forEach((d) => (html += itemHtml(d, d.topic)));
  }
  list.innerHTML = html;
  list.querySelectorAll('.item').forEach((el) => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      open(DATA.find((d) => d.path === el.dataset.path));
      closeSidebar();
    });
  });
  highlight();
}

function itemHtml(d, meta) {
  const main = view === 'topic' ? d.date : (d.title || d.date);
  return `<a class="item" href="#${encodeURIComponent(d.path)}" data-path="${esc(d.path)}">
    ${esc(main)}<span class="meta">${esc(meta)}</span></a>`;
}

async function open(d) {
  if (!d) return;
  current = d;
  location.hash = encodeURIComponent(d.path);
  $('#crumb').innerHTML = `<b>${esc(d.topic)}</b> · ${esc(d.date)}`;
  const sheet = $('#sheet');
  try {
    const md = await (await fetch(d.path, { cache: 'no-store' })).text();
    sheet.innerHTML =
      `<span class="doc-topic">${esc(d.topic)}</span>` +
      `<div class="doc">${marked.parse(md)}</div>`;
  } catch (e) {
    sheet.innerHTML = `<div class="placeholder"><p>묵상을 불러오지 못했어요.<br><code>${esc(d.path)}</code></p></div>`;
  }
  $('.scroll').scrollTop = 0;
  highlight();
}

function highlight() {
  document.querySelectorAll('.item').forEach((el) =>
    el.classList.toggle('active', current && el.dataset.path === current.path)
  );
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

// 탭 전환
document.querySelectorAll('.tab').forEach((t) =>
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach((x) => x.classList.remove('active'));
    t.classList.add('active');
    view = t.dataset.view;
    renderList();
  })
);

// 인쇄
$('#printBtn').addEventListener('click', () => {
  if (!current) { alert('먼저 묵상을 선택하세요.'); return; }
  window.print();
});

// 모바일 메뉴
function closeSidebar() { $('#sidebar').classList.remove('open'); $('#backdrop').classList.remove('show'); }
$('#menuBtn').addEventListener('click', () => { $('#sidebar').classList.add('open'); $('#backdrop').classList.add('show'); });
$('#backdrop').addEventListener('click', closeSidebar);

window.addEventListener('hashchange', () => {
  const hash = decodeURIComponent(location.hash.slice(1));
  const d = DATA.find((x) => x.path === hash);
  if (d && (!current || d.path !== current.path)) open(d);
});

boot();
</script>
</body>
</html>
